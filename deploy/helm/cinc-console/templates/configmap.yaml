apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cinc-console.fullname" . }}
  labels:
    {{- include "cinc-console.labels" . | nindent 4 }}
data:
  CINC_SERVER_URL: {{ required "cincServerUrl is required" .Values.cincServerUrl | quote }}
  CINC_SSL_NO_VERIFY: {{ .Values.sslNoVerify | quote }}
  SESSION_TTL_SECONDS: {{ .Values.sessionTtlSeconds | quote }}
