{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cinc-console.fullname" . }}
  labels:
    {{- include "cinc-console.labels" . | nindent 4 }}
type: Opaque
data:
  CINC_WEBUI_KEY: {{ required "webuiKey is required (or set existingSecret)" .Values.webuiKey | b64enc | quote }}
  {{- /* Preserve a generated session secret across upgrades via lookup. */}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "cinc-console.fullname" .) }}
  {{- $session := .Values.sessionSecret }}
  {{- if not $session }}
    {{- if and $existing $existing.data (hasKey $existing.data "SESSION_SECRET") }}
      {{- $session = index $existing.data "SESSION_SECRET" | b64dec }}
    {{- else }}
      {{- $session = randAlphaNum 48 }}
    {{- end }}
  {{- end }}
  SESSION_SECRET: {{ $session | b64enc | quote }}
  {{- if .Values.caCert }}
  CINC_CA_CERT: {{ .Values.caCert | b64enc | quote }}
  {{- end }}
{{- end }}
