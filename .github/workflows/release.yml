name: release

# Publish a multi-arch container image when a GitHub Release is published.
# The image goes to GHCR under the repository owner: ghcr.io/<owner>/cinc-console.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # push the image to GHCR with GITHUB_TOKEN
  id-token: write # OIDC token for keyless Sigstore signing of the provenance
  attestations: write # record the signed attestation in GitHub's store

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # QEMU + buildx give us the cross-build (arm64) and OCI features.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the release: the semver (e.g. 0.2.0), the major.minor
      # (0.2), and latest. The leading "v" on the git tag is stripped automatically.
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/cinc-console
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit attestations attached to the image index: a full provenance
          # record (mode=max) and an SPDX SBOM, inspectable with
          # `docker buildx imagetools inspect --format '{{json .SBOM}}' <ref>`.
          provenance: mode=max
          sbom: true

      # A second, Sigstore-signed SLSA provenance attestation recorded in GitHub's
      # transparency log and pushed alongside the image. Verify with:
      #   gh attestation verify oci://ghcr.io/<owner>/cinc-console:<tag> --owner <owner>
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cinc-console
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
